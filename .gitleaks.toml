# Gitleaks configuration for Strawberry
# Scans staged files for secrets before commit

title = "strawberry secret scanning"

[extend]
# Use the default gitleaks rules (covers AWS, GCP, GitHub, Slack, Telegram, generic API keys, etc.)
useDefault = true

[allowlist]
# Known false positives
regexes = [
    # Repo slug Duongntd/strawberry — triggers generic-api-key on high entropy
    # from slash + mixed-case. Not a secret.
    '''Duongntd/strawberry''',
]
# Files that are safe to ignore
paths = [
    '''\.gitignore''',
    '''\.gitleaks\.toml''',
    '''agents/.*/journal/.*''',
    '''scripts/setup-branch-protection\.sh''',
    '''plans/.*''',
    # Encrypted secrets are ASCII-armored age blobs (high-entropy base64 inside
    # BEGIN AGE ENCRYPTED FILE markers) — gitleaks default heuristics flag them
    # as generic secrets. Ciphertext is safe to commit by definition.
    '''secrets/encrypted/.*\.age''',
    '''secrets/encrypted/.*\.age\.sha256''',
    '''secrets/recipients\.txt''',
    '''tools/encrypt\.html''',
    '''tools/encrypt\.html\.sha256''',
    '''tools/age-bundle\.js''',
]
