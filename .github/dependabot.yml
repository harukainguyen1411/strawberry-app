version: 2
updates:
  - package-ecosystem: npm
    directory: /apps/myapps
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # contributor-bot was deprecated in e4bab47 (replaced by coder-worker).
  # Keep the manifest entry so dependabot doesn't error, but stop opening
  # new PRs until the tree is deleted (see task #14 follow-up).
  - package-ecosystem: npm
    directory: /apps/contributor-bot
    schedule:
      interval: weekly
    open-pull-requests-limit: 0

  - package-ecosystem: npm
    directory: /apps/discord-relay
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /apps/coder-worker
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
