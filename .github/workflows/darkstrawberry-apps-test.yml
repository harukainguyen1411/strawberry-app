name: darkstrawberry-apps — Tests (unit + E2E)

on:
  pull_request:
    branches: [main]
    # No paths filter — always run so the required status check always reports.
    # Steps are individually gated on whether apps/darkstrawberry-apps/ changed.

permissions:
  contents: read

jobs:
  unit:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if darkstrawberry-apps changed
        id: changed
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          if git diff --name-only "$BASE" "$HEAD" | grep -qE '^apps/(darkstrawberry-apps|platform|shared)/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip — darkstrawberry-apps unchanged
        if: steps.changed.outputs.changed == 'false'
        run: echo "No apps/darkstrawberry-apps changes — skipping unit tests, reporting success."

      - name: Set up Node
        if: steps.changed.outputs.changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/darkstrawberry-apps/package-lock.json

      - name: Install dependencies
        if: steps.changed.outputs.changed == 'true'
        working-directory: apps/darkstrawberry-apps
        run: npm ci

      - name: Run unit tests
        if: steps.changed.outputs.changed == 'true'
        working-directory: apps/darkstrawberry-apps
        run: npm run test:run

  e2e:
    name: E2E tests (Playwright / Chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if darkstrawberry-apps changed
        id: changed
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          if git diff --name-only "$BASE" "$HEAD" | grep -qE '^apps/(darkstrawberry-apps|platform|shared)/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip — darkstrawberry-apps unchanged
        if: steps.changed.outputs.changed == 'false'
        run: echo "No apps/darkstrawberry-apps changes — skipping E2E tests, reporting success."

      - name: Set up Node
        if: steps.changed.outputs.changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/darkstrawberry-apps/package-lock.json

      - name: Install dependencies
        if: steps.changed.outputs.changed == 'true'
        working-directory: apps/darkstrawberry-apps
        run: npm ci

      - name: Cache Playwright browsers
        if: steps.changed.outputs.changed == 'true'
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/darkstrawberry-apps/package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.changed.outputs.changed == 'true'
        working-directory: apps/darkstrawberry-apps
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        if: steps.changed.outputs.changed == 'true'
        working-directory: apps/darkstrawberry-apps
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
        run: npm run test:e2e:ci

      - name: Upload Playwright report
        if: always() && steps.changed.outputs.changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/darkstrawberry-apps/playwright-report/
          retention-days: 7
