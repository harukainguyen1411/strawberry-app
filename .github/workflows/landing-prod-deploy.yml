name: Deploy Landing to Firebase Hosting

on:
  push:
    branches: [main]
    paths:
      - 'apps/landing/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Write service account key
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/sa.json

      - name: Deploy to Firebase Hosting (darkstrawberry-landing)
        working-directory: apps/landing
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: npx firebase-tools@latest deploy --only hosting --project myapps-b31ea --non-interactive
