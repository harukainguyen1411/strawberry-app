name: E2E (Playwright)

on:
  pull_request:
    branches:
      - main
    # No paths filter — always run so the required "Playwright E2E" status check
    # always reports. Steps are individually gated on what actually changed.

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect TDD-enabled packages and myapps-only scope
        id: detect
        shell: bash
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          changed=$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null || true)
          has_tdd=""
          only_myapps="true"
          for f in $changed; do
            # Check if this file is outside apps/myapps/
            if ! echo "$f" | grep -qE '^apps/myapps/'; then
              only_myapps="false"
            fi
            dir=$(dirname "$f")
            while [ "$dir" != "." ]; do
              if [ -f "$dir/package.json" ]; then
                enabled=$(node -e "try{const p=require('./$dir/package.json');process.stdout.write(String(p.tdd&&p.tdd.enabled===true))}catch(e){process.stdout.write('false')}" 2>/dev/null || echo "false")
                if [ "$enabled" = "true" ]; then
                  has_tdd="yes"
                fi
                break
              fi
              dir=$(dirname "$dir")
            done
          done
          # If nothing changed at all, treat as non-myapps so we don't skip
          if [ -z "$changed" ]; then
            only_myapps="false"
          fi
          echo "has_tdd=$has_tdd" >> "$GITHUB_OUTPUT"
          echo "only_myapps=$only_myapps" >> "$GITHUB_OUTPUT"

      - name: Skip — myapps-only PR (myapps-test.yml is sole E2E authority)
        if: steps.detect.outputs.only_myapps == 'true'
        run: echo "Only apps/myapps/** changed — Playwright E2E skipped here (green no-op). myapps-test.yml owns E2E for this path."

      - name: Skip — no TDD-enabled packages changed
        if: steps.detect.outputs.only_myapps != 'true' && steps.detect.outputs.has_tdd != 'yes'
        run: echo "No TDD-enabled packages in this PR — E2E skipped (green no-op)."

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        if: steps.detect.outputs.only_myapps != 'true' && steps.detect.outputs.has_tdd == 'yes'
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.detect.outputs.only_myapps != 'true' && steps.detect.outputs.has_tdd == 'yes'
        run: npm ci

      - name: Install Playwright browsers
        if: steps.detect.outputs.only_myapps != 'true' && steps.detect.outputs.has_tdd == 'yes'
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E
        if: steps.detect.outputs.only_myapps != 'true' && steps.detect.outputs.has_tdd == 'yes'
        run: |
          for dir in dashboards/* apps/*; do
            if [ -f "$dir/package.json" ] && [ -f "$dir/playwright.config.ts" ]; then
              enabled=$(node -e "try{const p=require('./$dir/package.json');process.stdout.write(String(p.tdd&&p.tdd.enabled===true))}catch(e){process.stdout.write('false')}" 2>/dev/null || echo "false")
              if [ "$enabled" = "true" ]; then
                echo "Running E2E for $dir"
                (cd "$dir" && npm run test:e2e -- --retries=2 --reporter=html)
              fi
            fi
          done
        env:
          CI: true
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Upload Playwright report
        if: always() && steps.detect.outputs.only_myapps != 'true' && steps.detect.outputs.has_tdd == 'yes'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4.6.1
        with:
          name: playwright-report
          path: '**/playwright-report/'
          retention-days: 30
