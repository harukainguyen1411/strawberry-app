name: Unit Tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: '20'

      - name: Install workspace dependencies
        run: npm install --prefer-offline

      - name: Detect TDD-enabled packages with staged changes
        id: detect
        shell: bash
        run: |
          changed=$(git diff --name-only origin/main...HEAD 2>/dev/null || true)
          tdd_pkgs=""
          for f in $changed; do
            dir=$(dirname "$f")
            while [ "$dir" != "." ]; do
              if [ -f "$dir/package.json" ]; then
                enabled=$(node -e "try{const p=require(require('path').resolve('$dir/package.json'));process.stdout.write(String(p.tdd&&p.tdd.enabled===true))}catch(e){process.stdout.write('false')}" 2>/dev/null || echo "false")
                if [ "$enabled" = "true" ]; then
                  case "$tdd_pkgs" in
                    *"|$dir|"*) ;;
                    *) tdd_pkgs="$tdd_pkgs|$dir|" ;;
                  esac
                fi
                break
              fi
              dir=$(dirname "$dir")
            done
          done
          echo "tdd_pkgs=$tdd_pkgs" >> "$GITHUB_OUTPUT"
          if [ -n "$tdd_pkgs" ]; then
            echo "has_tdd=yes" >> "$GITHUB_OUTPUT"
          else
            echo "has_tdd=no" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip — no TDD-enabled packages changed
        if: steps.detect.outputs.has_tdd != 'yes'
        run: echo "No TDD-enabled packages changed — unit-tests skipped (green no-op)."

      - name: Run unit tests per package
        if: steps.detect.outputs.has_tdd == 'yes'
        env:
          TDD_PKGS: ${{ steps.detect.outputs.tdd_pkgs }}
        shell: bash
        run: |
          FAILED=0
          OLD_IFS="$IFS"
          IFS="|"
          for pkg in $TDD_PKGS; do
            [ -z "$pkg" ] && continue
            if [ -f "$pkg/package.json" ]; then
              echo "Running unit tests for $pkg"
              (cd "$pkg" && npm install --prefer-offline && npm run test:unit --if-present) || FAILED=1
            fi
          done
          IFS="$OLD_IFS"
          if [ "$FAILED" -ne 0 ]; then
            echo "Unit tests failed."
            exit 1
          fi
