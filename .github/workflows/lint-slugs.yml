name: Lint — no hardcoded repo slugs

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-slugs:
    name: check-no-hardcoded-slugs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run slug regression guard
        run: bash scripts/hooks/check-no-hardcoded-slugs.sh
