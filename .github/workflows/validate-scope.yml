name: Validate Scope

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-scope:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Report scope (informational only)
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          echo "=== Changed files ==="
          echo "$CHANGED"
          echo ""
          echo "=== Files in apps/darkstrawberry-apps/ ==="
          echo "$CHANGED" | grep '^apps/darkstrawberry-apps/' || echo "(none)"
          echo ""
          echo "=== Files outside apps/darkstrawberry-apps/ ==="
          echo "$CHANGED" | grep -v '^apps/darkstrawberry-apps/' || echo "(none)"
          echo ""
          echo "Scope check complete (informational only — this step never blocks)"
          exit 0
